kind = "web"
previewPath = "/"
title = "ZenSpace — Official Website"
version = "1.0.0"
id = "artifacts/zenspace-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19304

[services.development]
run = "pnpm --filter @workspace/zenspace-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zenspace-web", "run", "build" ]
publicDir = "artifacts/zenspace-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19304"
BASE_PATH = "/"

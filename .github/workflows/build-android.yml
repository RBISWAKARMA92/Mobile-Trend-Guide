name: Build Android AAB (Play Store)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'artifacts/fittrack/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Run Expo prebuild
        working-directory: artifacts/fittrack
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_DOMAIN: placeholder
        run: npx expo prebuild --platform android --clean

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/zenspace-release.jks

      - name: Make Gradle executable
        working-directory: artifacts/fittrack/android
        run: chmod +x gradlew

      - name: Build Release AAB (signed)
        working-directory: artifacts/fittrack/android
        run: |
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pandroid.injected.signing.store.file=/tmp/zenspace-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ZenSpace-v12-release-AAB
          path: artifacts/fittrack/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error
